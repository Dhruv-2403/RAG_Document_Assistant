<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Assistant</title>
    <link rel="stylesheet" href="/static/styles.css?v=1.1">
</head>
<body>
    <div class="container">
        <header>
            <h1>RAG Document Assistant</h1>
            <p class="subtitle">Upload documents and ask questions powered by AI</p>
        </header>

        <main>
            <!-- Upload Section -->
            <section class="card upload-section">
                <h2>Upload Document</h2>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept=".pdf,.txt" hidden>
                    <div class="upload-content">
                        <p>Click to upload or drag and drop</p>
                        <p class="upload-hint">PDF or TXT files (max 10MB)</p>
                    </div>
                </div>
                <div id="uploadStatus" class="status-message"></div>
                
                <!-- Document List -->
                <div class="document-list" id="documentList">
                    <h3>Uploaded Documents</h3>
                    <ul id="docListItems"></ul>
                    <button id="clearBtn" class="btn btn-danger">Clear All Documents</button>
                </div>
            </section>

            <!-- Query Section -->
            <section class="card query-section">
                <h2>Ask a Question</h2>
                <form id="queryForm">
                    <div class="input-group">
                        <textarea 
                            id="questionInput" 
                            placeholder="Ask a question about your documents..."
                            rows="3"
                            required
                        ></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="askBtn">
                        Ask Question
                    </button>
                </form>
                
                <!-- Answer Display -->
                <div id="answerSection" class="answer-section" style="display: none;">
                    <h3>Answer</h3>
                    <div id="answerText" class="answer-text"></div>
                    
                    <h3>Sources</h3>
                    <div id="sourcesContainer" class="sources-container"></div>
                </div>
                
                <div id="queryStatus" class="status-message"></div>
            </section>
        </main>

        <footer>
            <p>Powered by FastAPI, LangChain, and Groq</p>
        </footer>
    </div>

    <script src="/static/script.js?v=1.1"></script>
</body>
</html>
